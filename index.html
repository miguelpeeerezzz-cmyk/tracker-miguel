<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker — AEI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0e1a;
  --bg2:     #0f1625;
  --bg3:     #141d30;
  --panel:   #111827;
  --border:  #1e2d45;
  --border2: #243350;
  --accent:  #3b82f6;
  --accent2: #60a5fa;
  --gold:    #f59e0b;
  --gold2:   #fbbf24;
  --green:   #10b981;
  --green2:  #34d399;
  --orange:  #f97316;
  --red:     #ef4444;
  --red2:    #f87171;
  --text:    #e2e8f0;
  --text2:   #94a3b8;
  --text3:   #475569;
  --mono:    'Space Mono', monospace;
  --sans:    'DM Sans', sans-serif;
  --r:       8px;
  --r2:      12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
 
/* LAYOUT */
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:52px 1fr;height:100vh;}
 
/* TOPBAR */
.topbar{grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:50;}
.logo{font-family:var(--mono);font-size:12px;color:var(--accent2);letter-spacing:.08em;}
.logo span{color:var(--text3);}
.status-wrap{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text3);font-family:var(--mono);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s;}
.dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot.saving{background:var(--gold);animation:blink .7s infinite;}
.dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.warn-bar{display:none;background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);
  border-radius:var(--r);padding:4px 10px;font-size:11px;color:var(--orange);font-family:var(--mono);}
.warn-bar.show{display:flex;align-items:center;gap:6px;}
.menu-btn{display:none;background:none;border:1px solid var(--border);border-radius:var(--r);
  color:var(--text2);padding:5px 8px;cursor:pointer;font-size:15px;}
 
/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;gap:2px;padding:10px 0;}
.sec-label{padding:8px 14px 3px;font-family:var(--mono);font-size:9px;color:var(--text3);
  letter-spacing:.12em;text-transform:uppercase;}
.subj-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 14px;
  background:transparent;border:none;border-left:3px solid transparent;cursor:pointer;
  text-align:left;color:var(--text2);font-family:var(--sans);font-size:12px;transition:all .15s;}
.subj-btn:hover{background:var(--bg3);color:var(--text);}
.subj-btn.active{background:rgba(59,130,246,.1);border-left-color:var(--accent);color:var(--text);}
.subj-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center;}
.subj-name{flex:1;line-height:1.3;}
.subj-pct{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;}
.subj-btn.active .subj-pct{color:var(--accent2);}
.review-btn{margin:10px 14px 0;padding:8px 12px;background:rgba(59,130,246,.08);
  border:1px solid rgba(59,130,246,.2);border-radius:var(--r);color:var(--accent2);
  font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:7px;}
.review-btn:hover{background:rgba(59,130,246,.18);}
.ubadge{background:var(--red);color:#fff;border-radius:99px;padding:1px 6px;font-size:10px;margin-left:auto;display:none;}
 
/* MAIN */
.main{overflow-y:auto;padding:20px;}
 
/* SUBJECT HEADER */
.subj-title{font-family:var(--mono);font-size:16px;font-weight:700;margin-bottom:10px;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.prog-track{flex:1;height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:var(--text3);transition:width .4s,background .4s;}
.prog-fill.orange{background:var(--orange);}
.prog-fill.green{background:linear-gradient(90deg,var(--green),var(--green2));box-shadow:0 0 6px var(--green);}
.prog-pct{font-family:var(--mono);font-size:12px;color:var(--text2);width:38px;text-align:right;}
.prog-det{font-size:11px;color:var(--text3);}
 
/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--sans);
  font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--text);}
.btn.pri{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.35);color:var(--accent2);}
.btn.pri:hover{background:rgba(59,130,246,.22);}
 
/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead th{background:var(--bg3);padding:9px 10px;font-family:var(--mono);font-size:9px;
  color:var(--text3);letter-spacing:.1em;text-transform:uppercase;text-align:center;
  border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:nth-child(2){text-align:left;}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody tr.imp{background:rgba(245,158,11,.06);}
tbody tr.imp:hover{background:rgba(245,158,11,.10);}
tbody tr.flash{animation:flashG .6s ease;}
@keyframes flashG{0%{background:rgba(16,185,129,.3)}100%{background:transparent}}
td{padding:8px 10px;text-align:center;vertical-align:middle;}
td:nth-child(2){text-align:left;}
 
/* STAR */
.star{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);transition:transform .12s;}
.star:hover{transform:scale(1.2);}
.star.on{color:var(--gold2);text-shadow:0 0 7px var(--gold);}
 
/* TOPIC NAME */
.tname{font-size:13px;color:var(--text);cursor:pointer;padding:2px 4px;border-radius:4px;}
.tname:hover{background:var(--bg3);}
.tedit{background:var(--bg3);border:1px solid var(--accent);border-radius:4px;color:var(--text);
  font-family:var(--sans);font-size:13px;padding:2px 6px;width:100%;outline:none;}
 
/* CHECKBOXES */
.chk{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border2);background:transparent;
  cursor:pointer;font-size:13px;transition:all .12s;display:inline-flex;align-items:center;justify-content:center;color:transparent;}
.chk:hover{border-color:var(--accent);}
.chk.cg{background:rgba(16,185,129,.14);border-color:var(--green);color:var(--green2);}
.chk.co{background:rgba(249,115,22,.14);border-color:var(--orange);color:var(--orange);}
 
/* REPASO BTN */
.repbtn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;
  border:1px solid var(--border2);background:var(--bg3);color:var(--text2);
  font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .12s;}
.repbtn:hover{border-color:var(--accent);color:var(--accent2);}
.repcnt{font-weight:700;color:var(--accent2);}
 
/* CONFIANZA SELECT */
.conf{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);
  font-family:var(--sans);font-size:12px;padding:4px 7px;cursor:pointer;outline:none;transition:all .12s;}
.conf:focus{border-color:var(--accent);}
.conf.bajo{border-color:var(--red);color:var(--red2);background:rgba(239,68,68,.08);}
.conf.medio{border-color:var(--orange);color:var(--orange);background:rgba(249,115,22,.08);}
.conf.alto{border-color:var(--green);color:var(--green2);background:rgba(16,185,129,.08);}
 
/* DATE INPUT */
.dateinp{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  color:var(--text2);font-family:var(--mono);font-size:11px;padding:4px 7px;
  cursor:pointer;outline:none;transition:border-color .12s;}
.dateinp:focus{border-color:var(--accent);}
.dateinp::-webkit-calendar-picker-indicator{filter:invert(.5);}
 
/* DATE DISPLAY */
.dcell{font-family:var(--mono);font-size:11px;color:var(--text3);}
 
/* URGENCIA */
.urg{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;
  font-family:var(--mono);font-weight:700;white-space:nowrap;}
.urg.urgente{background:rgba(239,68,68,.14);color:var(--red2);border:1px solid rgba(239,68,68,.28);}
.urg.pronto{background:rgba(249,115,22,.14);color:var(--orange);border:1px solid rgba(249,115,22,.28);}
.urg.aldia{background:rgba(16,185,129,.11);color:var(--green2);border:1px solid rgba(16,185,129,.22);}
.urg.none{background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
 
/* DELETE */
.delbtn{opacity:0;background:none;border:1px solid transparent;border-radius:6px;
  color:var(--red);cursor:pointer;font-size:13px;padding:4px 6px;transition:all .12s;}
tr:hover .delbtn{opacity:1;}
.delbtn:hover{background:rgba(239,68,68,.12);border-color:var(--red);}
 
/* REVIEW PANEL */
.rev-panel{display:none;}
.rev-panel.on{display:block;}
.rev-title{font-family:var(--mono);font-size:13px;color:var(--text2);margin-bottom:14px;
  letter-spacing:.08em;text-transform:uppercase;}
.rev-cards{display:grid;gap:9px;}
.rev-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  padding:13px 15px;display:flex;align-items:center;gap:12px;transition:border-color .12s;}
.rev-card:hover{border-color:var(--border2);}
.rev-info{flex:1;}
.rev-name{font-size:14px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:7px;}
.rev-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px;}
.rev-when{font-family:var(--mono);font-size:12px;color:var(--text2);text-align:right;flex-shrink:0;}
.rev-empty{text-align:center;color:var(--text3);font-family:var(--mono);font-size:13px;padding:40px 0;}
 
/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;
  align-items:center;justify-content:center;}
.modal-ov.show{display:flex;}
.modal-box{background:var(--panel);border:1px solid var(--border2);border-radius:var(--r2);
  padding:22px 26px;max-width:320px;width:90%;box-shadow:0 20px 40px rgba(0,0,0,.5);}
.modal-t{font-family:var(--mono);font-size:12px;color:var(--text);margin-bottom:7px;}
.modal-m{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5;}
.modal-row{display:flex;gap:9px;justify-content:flex-end;}
.mbtn{padding:7px 15px;border-radius:var(--r);font-family:var(--sans);font-size:13px;cursor:pointer;}
.mbtn-c{border:1px solid var(--border2);background:var(--bg3);color:var(--text2);}
.mbtn-d{border:1px solid rgba(239,68,68,.35);background:rgba(239,68,68,.13);color:var(--red2);font-weight:600;}
.mbtn-d:hover{background:rgba(239,68,68,.22);}
 
/* MOBILE */
@media(max-width:650px){
  .app{grid-template-columns:1fr;height:auto;min-height:100vh;}
  .sidebar{position:fixed;left:-230px;top:52px;width:220px;height:calc(100%-52px);
    z-index:200;transition:left .22s;box-shadow:none;}
  .sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.5);}
  .menu-btn{display:flex !important;}
  .main{padding:14px;}
}
 
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
</style>
</head>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const SUBJS = [
  {id:"mates", icon:"∑", name:"Ampliación de Matemáticas"},
  {id:"calor",  icon:"🌡", name:"Transferencia de Calor"},
  {id:"dibujo", icon:"✏", name:"Dibujo"},
  {id:"electr", icon:"⚡", name:"Electricidad"},
  {id:"auto",   icon:"⚙", name:"Automática"},
  {id:"fluids", icon:"〜", name:"Fluidos 2"},
  {id:"fabr",   icon:"🔧", name:"Ingeniería de Fabricación"},
  {id:"elast",  icon:"△", name:"Elasticidad y Resistencia de Materiales"}
];
 
const SAMPLES = {
  mates:  ["Series de Fourier","Transformada de Laplace","Ecuaciones diferenciales","Variable compleja","Series de Taylor","Transformada Z","Espacios vectoriales","Cálculo variacional","Operadores diferenciales","Funciones de Bessel"],
  calor:  ["Conducción estacionaria","Conducción transitoria","Convección forzada","Convección natural","Radiación térmica","Intercambiadores de calor","Aletas","Factor de forma","Resistencia térmica","Capa límite térmica"],
  dibujo: ["Vistas normalizadas","Cortes y secciones","Tolerancias geométricas","Roscas y tornillos","Acotación","Perspectiva isométrica","Engranajes","Soldaduras","Ajustes dimensionales","Planos de conjunto"],
  electr: ["Circuitos CC","Circuitos CA","Teorema de Thevenin","Resonancia RLC","Transformadores","Máquinas de CC","Motores asíncronos","Semiconductores","Amplificadores","Filtros"],
  auto:   ["Función de transferencia","Diagrama de Bode","Lugar de las raíces","Controlador PID","Estabilidad Routh","Criterio de Nyquist","Espacio de estados","Controlabilidad","Control digital","Sistemas no lineales"],
  fluids: ["Ecuación de Navier-Stokes","Capa límite laminar","Capa límite turbulenta","Flujo compresible","Ondas de choque","Perfiles aerodinámicos","Flujo en toberas","Número de Mach","Aerodinámica subsónica","Flujo potencial"],
  fabr:   ["Mecanizado","Fundición","Conformado","Soldadura","Tratamientos térmicos","Control de calidad","Tolerancias de fabricación","Materiales metálicos","Polímeros industriales","Fabricación aditiva"],
  elast:  ["Tensión y deformación","Ley de Hooke generalizada","Flexión pura","Cortante en vigas","Torsión","Pandeo de Euler","Criterios de fallo","Fatiga","Tensiones planas","Círculo de Mohr"]
};
 
const KEY = "tracker-aei-v4";
let state = {};
let cur = "mates";
let showRev = false;
let fbOk = false;
let _skipSnap = false;
let saveTimer = null;
 
function newTopic(name){ return {id:crypto.randomUUID(),name,star:false,enClase:false,estudiado:false,repasos:0,confianza:"",lastRepaso:""}; }
 
function initState(){
  state = {};
  SUBJS.forEach(s => { state[s.id] = {topics: SAMPLES[s.id].map(newTopic)}; });
}
 
// ═══════════════════════════════════════
// SM-2
// ═══════════════════════════════════════
function interval(conf, reps){
  if(!conf || conf==="Bajo") return [1,2,3][Math.min(reps,2)];
  if(conf==="Medio") return [3,5,7,10][Math.min(reps,3)];
  return [5,10,14,21][Math.min(reps,3)];
}
function urgencia(t){
  if(!t.lastRepaso){
    if(!t.confianza||t.confianza==="Bajo") return "urgente";
    if(t.confianza==="Medio") return "pronto";
    return "aldia";
  }
  const diff = Math.floor((Date.now() - new Date(t.lastRepaso)) / 86400000);
  const rem = interval(t.confianza, t.repasos) - diff;
  if(rem<=0) return "urgente";
  if(rem<=2) return "pronto";
  return "aldia";
}
function nextDate(t){
  if(!t.lastRepaso) return null;
  const d = new Date(t.lastRepaso);
  d.setDate(d.getDate() + interval(t.confianza, t.repasos));
  return d;
}
function fmtDate(d){ if(!d) return "—"; return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`; }
function daysUntil(d){ if(!d) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.ceil((d-t)/86400000); }
function whenLabel(d){
  const n = daysUntil(d);
  if(n===null) return "";
  if(n<=0) return "Hoy";
  if(n===1) return "Mañana";
  return `En ${n}d`;
}
 
// ═══════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════
function progress(id){
  const tp = state[id].topics;
  if(!tp.length) return {pct:0,done:0,total:0};
  let pts=0, done=0;
  tp.forEach(t=>{
    const p=(t.enClase?1:0)+(t.estudiado?1:0)+(t.repasos>0?1:0);
    pts+=p; if(p===3) done++;
  });
  return {pct:Math.round(pts/(tp.length*3)*100), done, total:tp.length};
}
 
// ═══════════════════════════════════════
// SAVE
// ═══════════════════════════════════════
function setStatus(s){
  const dot=document.getElementById("dot"), txt=document.getElementById("stxt");
  dot.className="dot"+(s?" "+s:"");
  txt.textContent = s==="ok"?"guardado ✓":s==="saving"?"guardando…":s==="err"?"error":"local";
}
function save(){
  setStatus("saving");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    localStorage.setItem(KEY, JSON.stringify(state));
    if(fbOk && window._fb){
      try{ await window._fb.save(state); setStatus("ok"); }
      catch(e){ setStatus("err"); }
    } else { setStatus("ok"); }
  }, 600);
}
 
// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function confirm2(msg, cb){
  document.getElementById("modalMsg").textContent = msg;
  document.getElementById("modal").classList.add("show");
  document.getElementById("modalSi").onclick = ()=>{ document.getElementById("modal").classList.remove("show"); cb(); };
  document.getElementById("modalNo").onclick = ()=>{ document.getElementById("modal").classList.remove("show"); };
}
document.getElementById("modal").onclick = e=>{ if(e.target===document.getElementById("modal")) document.getElementById("modal").classList.remove("show"); };
 
// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function renderSidebar(){
  const list = document.getElementById("subjList");
  list.innerHTML = "";
  SUBJS.forEach(s=>{
    const {pct} = progress(s.id);
    const btn = document.createElement("button");
    btn.className = "subj-btn" + (s.id===cur && !showRev ? " active" : "");
    btn.innerHTML = `<span class="subj-icon">${s.icon}</span><span class="subj-name">${s.name}</span><span class="subj-pct">${pct}%</span>`;
    btn.onclick = ()=>{ cur=s.id; showRev=false; render(); closeSidebar(); };
    list.appendChild(btn);
  });
  let urg=0;
  SUBJS.forEach(s=> state[s.id].topics.forEach(t=>{ if(urgencia(t)==="urgente") urg++; }));
  const badge = document.getElementById("ubadge");
  badge.textContent = urg;
  badge.style.display = urg>0 ? "inline" : "none";
}
 
function renderProgress(){
  const {pct,done,total} = progress(cur);
  const fill = document.getElementById("progFill");
  fill.style.width = pct+"%";
  fill.className = "prog-fill" + (pct>=100?" green":pct>=60?" orange":"");
  document.getElementById("progPct").textContent = pct+"%";
  document.getElementById("progDet").textContent = `${done}/${total} completos`;
}
 
function renderTopics(){
  const subj = SUBJS.find(s=>s.id===cur);
  document.getElementById("subjTitle").textContent = subj.icon+"  "+subj.name;
  renderProgress();
  const tbody = document.getElementById("tBody");
  tbody.innerHTML = "";
  state[cur].topics.forEach((t,i)=>{
    const urg = urgencia(t);
    const nd = nextDate(t);
    const tr = document.createElement("tr");
    if(t.star) tr.classList.add("imp");
    tr.innerHTML = `
      <td><button class="star${t.star?" on":""}">${t.star?"★":"☆"}</button></td>
      <td><span class="tname">${esc(t.name)}</span></td>
      <td><button class="chk${t.enClase?" cg":""}">${t.enClase?"✓":""}</button></td>
      <td><button class="chk${t.estudiado?" co":""}">${t.estudiado?"✓":""}</button></td>
      <td><button class="repbtn">🕐 <span class="repcnt">${t.repasos}</span></button></td>
      <td><select class="conf ${(t.confianza||"").toLowerCase()}">
        <option value="">—</option>
        <option value="Bajo"${t.confianza==="Bajo"?" selected":""}>Bajo</option>
        <option value="Medio"${t.confianza==="Medio"?" selected":""}>Medio</option>
        <option value="Alto"${t.confianza==="Alto"?" selected":""}>Alto</option>
      </select></td>
      <td><input type="date" class="dateinp" value="${t.lastRepaso||""}"></td>
      <td class="dcell">${fmtDate(nd)}${nd?" <span style='color:var(--text3);font-size:10px;'>("+whenLabel(nd)+")</span>":""}</td>
      <td><span class="urg ${urg}">${urg==="urgente"?"🔴 Urgente":urg==="pronto"?"🟡 Pronto":urg==="aldia"?"🟢 Al día":"—"}</span></td>
      <td><button class="delbtn">✕</button></td>
    `;
    // events
    tr.querySelector(".star").onclick    = ()=>{ t.star=!t.star; render(); save(); };
    tr.querySelector(".chk:nth-of-type(1)").onclick = ()=>{ t.enClase=!t.enClase; render(); save(); };
    tr.querySelector(".chk:nth-of-type(2)").onclick = ()=>{ t.estudiado=!t.estudiado; render(); save(); };
    tr.querySelector(".repbtn").onclick  = ()=>{
      t.repasos++; t.lastRepaso=new Date().toISOString().split("T")[0];
      tr.classList.add("flash"); setTimeout(()=>tr.classList.remove("flash"),650);
      render(); save();
    };
    tr.querySelector(".conf").onchange  = e=>{ t.confianza=e.target.value; e.target.className="conf "+(e.target.value||"").toLowerCase(); render(); save(); };
    tr.querySelector(".dateinp").onchange = e=>{ t.lastRepaso=e.target.value; render(); save(); };
    tr.querySelector(".tname").ondblclick = e=>{
      const span=e.target, inp=document.createElement("input");
      inp.className="tedit"; inp.value=t.name;
      span.replaceWith(inp); inp.focus();
      const done=()=>{ t.name=inp.value||t.name; render(); save(); };
      inp.onblur=done; inp.onkeydown=ev=>{ if(ev.key==="Enter"){done();ev.preventDefault();} };
    };
    tr.querySelector(".delbtn").onclick = ()=>{ confirm2(`¿Eliminar "${t.name}"?`, ()=>{ state[cur].topics.splice(i,1); render(); save(); }); };
    tbody.appendChild(tr);
  });
}
 
function renderReview(){
  const cards = document.getElementById("revCards");
  cards.innerHTML = "";
  const all = [];
  SUBJS.forEach(s=> state[s.id].topics.forEach(t=>{
    if(!t.name) return;
    const urg=urgencia(t), nd=nextDate(t), days=daysUntil(nd);
    all.push({t, urg, days, subj:s.name, urgOrd: urg==="urgente"?0:urg==="pronto"?1:2});
  }));
  all.sort((a,b)=>a.urgOrd-b.urgOrd||(a.days??99)-(b.days??99));
  const top = all.slice(0,7);
  if(!top.length){ cards.innerHTML='<div class="rev-empty">🎉 Todo al día</div>'; return; }
  top.forEach(({t,urg,days,subj})=>{
    let wl = days===null?"Sin repasar":days<=0?"Hoy":days===1?"Mañana":`En ${days} días`;
    const c=document.createElement("div"); c.className="rev-card";
    c.innerHTML=`
      <div class="rev-info">
        <div class="rev-name">${t.star?'<span style="color:var(--gold2)">★</span>':""} ${esc(t.name)} <span class="urg ${urg}">${urg==="urgente"?"🔴 Urgente":urg==="pronto"?"🟡 Pronto":"🟢 Al día"}</span></div>
        <div class="rev-sub">${subj} · Repasos: ${t.repasos} · Confianza: ${t.confianza||"—"}</div>
      </div>
      <div class="rev-when">${wl}</div>`;
    cards.appendChild(c);
  });
}
 
function render(){
  renderSidebar();
  if(showRev){
    document.getElementById("subjView").style.display="none";
    document.getElementById("revPanel").classList.add("on");
    renderReview();
  } else {
    document.getElementById("subjView").style.display="";
    document.getElementById("revPanel").classList.remove("on");
    renderTopics();
  }
}
 
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function closeSidebar(){ document.getElementById("sidebar").classList.remove("open"); }
 
// ═══════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════
document.getElementById("addBtn").onclick = ()=>{
  const name=prompt("Nombre del tema:");
  if(!name) return;
  state[cur].topics.push(newTopic(name));
  render(); save();
};
document.getElementById("sortBtn").onclick = ()=>{
  state[cur].topics.sort((a,b)=>(b.star?1:0)-(a.star?1:0));
  render(); save();
};
document.getElementById("revBtn").onclick = ()=>{ showRev=!showRev; render(); };
document.getElementById("menuBtn").onclick = ()=>{ document.getElementById("sidebar").classList.toggle("open"); };
 
// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init(){
  // Wait for Firebase (max 3s)
  if(!window._fbReady){
    await new Promise(r=>{
      document.addEventListener("fbReady",()=>r(),{once:true});
      setTimeout(r, 3000);
    });
  }
  fbOk = !!window._fb;
 
  if(!fbOk){ document.getElementById("warnBar").classList.add("show"); setStatus(""); }
 
  // Load data
  let loaded=false;
  if(fbOk){
    try{
      const cloud = await window._fb.load();
      if(cloud){ state=cloud; loaded=true; setStatus("ok"); }
    }catch(e){ console.warn("Firebase load error",e); }
  }
  if(!loaded){
    const local=localStorage.getItem(KEY);
    if(local){ try{ state=JSON.parse(local); loaded=true; }catch(e){} }
  }
  if(!loaded) initState();
 
  // Ensure all subjects
  SUBJS.forEach(s=>{ if(!state[s.id]) state[s.id]={topics:SAMPLES[s.id].map(newTopic)}; });
 
  // Real-time listener
  if(fbOk){
    window._fb.listen(data=>{
      if(_skipSnap) return;
      state=data;
      SUBJS.forEach(s=>{ if(!state[s.id]) state[s.id]={topics:SAMPLES[s.id].map(newTopic)}; });
      render();
      setStatus("ok");
    });
  }
 
  render();
}
 
init();
</script>
</body>
</html>
